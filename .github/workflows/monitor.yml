name: 🏠 Monitor Francos Rodríguez

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vigilar:
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 ¿Ya se envió la alerta?
        id: estado
        run: |
          if [ -f "ALERTA_ENVIADA.flag" ]; then
            echo "ya_alertado=true" >> "$GITHUB_OUTPUT"
          else
            echo "ya_alertado=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🐍 Setup Python
        if: steps.estado.outputs.ya_alertado == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar requests
        if: steps.estado.outputs.ya_alertado == 'false'
        run: pip install requests

      - name: 🕵️ Revisar página
        if: steps.estado.outputs.ya_alertado == 'false'
        id: revision
        continue-on-error: true
        env:
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_EMAIL_2:     ${{ secrets.NOTIFY_EMAIL_2 }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python monitor.py

      - name: 🚩 Marcar alerta como enviada
        if: steps.estado.outputs.ya_alertado == 'false' && steps.revision.outcome == 'failure'
        run: |
          echo "Alerta enviada el $(date '+%d/%m/%Y a las %H:%M UTC')" > ALERTA_ENVIADA.flag
          git config user.email "monitor-bot@github.com"
          git config user.name  "Monitor Bot"
          git add ALERTA_ENVIADA.flag
          git commit -m "🚨 Alerta enviada — piso disponible"
          git push
